<!doctype html>
<html>
<head><title>Please wait...</title></head>
<body>
<p id="status"></p>
<noscript><p>This site requires JavaScript to verify your browser.</p></noscript>
<script>
    const puzzle = "{{ puzzle }}";
    const parts = puzzle.split(".");
    const timestamp = parseInt(parts[0]);
    const difficulty = parseInt(parts[1]);
    const nonce = parts[2];

    document.getElementById("status").textContent = "Please wait";
    const worker = new Worker("/__heavy/worker.js");
    worker.postMessage({ nonce: nonce, difficulty: difficulty });
    worker.onmessage = async (msg) => {
        if (msg.data.type === "progress") {
            document.getElementById("status").textContent =
                "Please wait" + ".".repeat(Math.floor(msg.data.found / 2));
        } else if (msg.data.type === "done") {
            const resp = await fetch("/__heavy/submit", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    offsets: msg.data.offsets,
                    timestamp,
                }),
            });
            if (resp.ok) {
                location.reload();
            } else {
                document.getElementById("status").textContent =
                    "Verification failed. Please reload the page to try again.";
            }
        }
    };
</script>
</body>
</html>
